services:
  postgres:
    image: 'postgres:latest'
    ports:
      - "5432:5432"
    environment:
      - 'POSTGRES_DB=expense_db'
      - 'POSTGRES_USER=expense_user'
      - 'POSTGRES_PASSWORD=expensepassword'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
